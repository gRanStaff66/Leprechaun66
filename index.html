<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leprechaun66 - 3D Dancing Leprechaun Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #ui-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }

        .title-container { display: flex; justify-content: center; align-items: center; gap: 15px; padding-top: 20px; margin-bottom: 5px; flex-wrap: wrap; }
        .top-title { text-align: center; font-size: 2.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding-top: 0; background: linear-gradient(to right, #00FF87, #60EFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.8)) drop-shadow(0 0 15px rgba(0,0,0,0.6)); margin: 0; display: flex; gap: 0.3em; justify-content: center; }
        .top-title span { display: inline-block; }
        .clover-icon { font-size: 3.2rem; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.8)) drop-shadow(0 0 15px rgba(0,255,135,0.4)); animation: gentle-rock 3s infinite ease-in-out; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes gentle-rock { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }

        .subtitle-saying { text-align: center; color: rgba(255,255,255,0.95); font-size: 1.15rem; font-style: italic; font-weight: 600; margin: 0 auto; max-width: 800px; text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 15px rgba(0,0,0,0.9); pointer-events: none; transition: opacity 0.4s ease; min-height: 30px; padding: 0 20px; }

        @media (max-width: 640px) {
            .top-title { font-size: 1.5rem; letter-spacing: 1px; flex-direction: column; gap: 0; line-height: 1.1; }
            .top-title span { display: block; }
            .clover-icon { font-size: 2rem; }
            .subtitle-saying { font-size: 0.9rem; }
        }

        #bottom-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 100;
        }

        #bottom-panel {
            background: rgba(10, 20, 10, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
            border-radius: 20px 20px 0 0;
            padding: 0; display: flex; align-items: center; gap: 30px;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.8); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 95vw; pointer-events: auto;
            height: 0; opacity: 0; transform: translateY(100%); overflow: hidden;
            margin-bottom: -1px;
            position: relative;
        }
        #bottom-panel.active { height: auto; padding: 15px 35px; opacity: 1; transform: translateY(0); overflow: visible; }

        #panel-handle { display: none; width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 10px auto 5px; }

        #quick-actions {
            background: rgba(10, 20, 10, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px;
            padding: 12px; pointer-events: auto; z-index: 110;
        }

        #toggle-ui {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 900;
            letter-spacing: 1px; transition: all 0.2s; text-transform: uppercase;
        }
        #toggle-ui:hover { background: rgba(255,255,255,0.2); }
        #toggle-ui.active { background: #00FF87; color: #000; }

        .control-group { display: flex; align-items: center; gap: 12px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 25px; }
        .control-group:last-child { border-right: none; padding-right: 0; }

        .atmosphere-btns { display: flex; gap: 8px; }

        .label { color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-sm { padding: 8px 18px; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; color: white; text-transform: uppercase; }
        .btn-sm:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-active { border-color: #fff; box-shadow: 0 0 15px rgba(0, 255, 135, 0.3); }

        .bg-meadow { background: #1e7a1e; }
        .bg-rainbow { background: linear-gradient(90deg, #ff0055, #ffaa00); }
        .bg-disco { background: #6b21a8; }
        .btn-rand { background: linear-gradient(90deg, #FF512F, #DD2476); }
        .btn-share { background: #0066ff; }

        #easter-clover {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 15rem; z-index: 2000; pointer-events: none; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(0,255,135,0.8));
        }
        #easter-clover.zoom { transform: translate(-50%, -50%) scale(5); opacity: 0; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: #00FF87; color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 900; font-size: 14px; z-index: 1000; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 135, 0.4);
        }
        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        #mega-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0,0,0,0.85); color: #00FF87; padding: 40px 60px; border-radius: 40px;
            font-weight: 900; font-size: 48px; z-index: 2100; opacity: 0; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 100px rgba(0, 255, 135, 0.6);
            border: 4px solid #00FF87; text-align: center; text-transform: uppercase;
            letter-spacing: 4px; line-height: 1.2;
        }
        #mega-toast.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #interaction-hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
            font-size: 1.2rem; pointer-events: none; z-index: 50; opacity: 0;
            transition: opacity 1s ease; text-shadow: 0 0 20px rgba(0,255,135,0.8), 0 0 40px rgba(0,0,0,1);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        #interaction-hint.visible { opacity: 1; }
        .mouse-icon { font-size: 2rem; animation: mouse-move 2s infinite ease-in-out; }
        @keyframes mouse-move { 0%, 100% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }

        input[type=range] { width: 130px; cursor: pointer; accent-color: #00FF87; height: 4px; }
        #count-display { color: #00FF87; font-weight: 900; min-width: 30px; font-size: 18px; text-align: center; }

        .stepper-btn {
            width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.1);
            color: white; font-size: 20px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
            display: none; align-items: center; justify-content: center; cursor: pointer;
        }

        #loading { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #010101; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00FF87; z-index: 500; transition: opacity 0.5s; }

        /* Mobile / Portrait Styles */
        @media (orientation: portrait), (max-width: 900px) {
            .title-container { flex-direction: column; gap: 0; padding-top: 10px; }
            .top-title { font-size: 1.5rem; }
            .clover-icon { font-size: 2rem; }
            .subtitle-saying { font-size: 0.85rem; padding: 0 15px; font-weight: 500; }

            #quick-actions { padding: 15px; gap: 8px; }
            #toggle-ui { padding: 10px; flex: 1; order: 3; font-size: 10px; }
            .btn-rand { flex: 2; order: 1; padding: 10px !important; }
            .btn-share { flex: 1; order: 2; padding: 10px !important; }

            #bottom-panel {
                position: fixed; bottom: 70px; left: 0; width: 100%; max-width: 100vw;
                flex-direction: column; gap: 15px; padding: 15px 20px 30px;
                border-radius: 30px 30px 0 0; transform: translateY(120%);
                opacity: 0; height: 0; display: grid !important; grid-template-columns: 1fr;
                overflow: hidden; margin-bottom: 0;
            }
            #bottom-panel.active { transform: translateY(0); opacity: 1; height: auto; overflow: visible; }
            #panel-handle { display: block; }

            .control-group {
                flex-direction: row; border-right: none; padding-right: 0;
                width: 100%; justify-content: space-between;
                background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            }
            .control-group.horde-group { justify-content: center; gap: 20px; }

            .atmosphere-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }
            .btn-sm { width: 100%; text-align: center; padding: 10px 5px; font-size: 9px; }

            input[type=range] { display: block; width: 60%; }
            .stepper-btn { display: none; }

            .btn-rand { width: 100%; padding: 15px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="w-16 h-16 border-4 border-green-950 border-t-green-400 rounded-full animate-spin mb-6"></div>
        <div class="font-black tracking-[0.3em] uppercase text-xs">Wiring the Lights...</div>
    </div>

    <div id="easter-clover">🍀</div>

    <div id="toast">Copied to clipboard! ☘️</div>
    <div id="mega-toast">
        <div class="toast-icon text-6xl mb-4">🍀</div>
        <div class="toast-title">LUCKY 7!</div>
        <div class="toast-sub text-xl opacity-80 mt-2">PARTY MODE ACTIVATED!</div>
    </div>

    <div id="interaction-hint">
        <div class="mouse-icon">🖱️</div>
        <div>Drag to Explore</div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-zinc-900 border border-white/20 rounded-3xl p-8 max-w-sm w-full shadow-2xl transform transition-all">
            <h3 class="text-2xl font-black text-white mb-4 flex items-center gap-2">
                <span>☘️</span> Share the Luck
            </h3>
            <div id="share-content" class="bg-black/40 border border-white/10 rounded-xl p-4 text-zinc-300 text-sm italic mb-6 leading-relaxed">
                <!-- Text populated by JS -->
            </div>
            <div class="flex gap-3">
                <button onclick="copyAndClose()" class="flex-1 bg-green-500 hover:bg-green-400 text-black font-extrabold py-3 rounded-xl transition-colors uppercase text-xs tracking-widest">
                    Copy Link
                </button>
                <button onclick="closeModal()" class="px-6 py-3 rounded-xl border border-white/10 text-white font-bold hover:bg-white/5 transition-colors uppercase text-xs tracking-widest">
                    Close
                </button>
            </div>
        </div>
    </div>

    <div id="ui-wrapper">
        <!-- Panel Backdrop -->
        <div id="panel-backdrop" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[90] hidden transition-opacity pointer-events-auto" onclick="toggleUI()"></div>

        <div>
            <div class="title-container">
                <span class="clover-icon cursor-pointer pointer-events-auto" id="left-clover" style="animation-delay: 0s;" onclick="if(window.triggerCloverRain) window.triggerCloverRain()">☘️</span>
                <h1 class="top-title">
                    <span>Happy</span> <span>St Patrick's</span> <span>Day~!</span>
                </h1>
                <span class="clover-icon cursor-pointer pointer-events-auto" id="right-clover" style="animation-delay: -1.5s;" onclick="if(window.triggerCloverRain) window.triggerCloverRain()">☘️</span>
            </div>
            <div id="irish-saying" class="subtitle-saying"></div>
        </div>

        <div id="bottom-container">
            <div id="bottom-panel" class="">
                <div id="panel-handle"></div>
                <div class="control-group">
                    <span class="label">Atmosphere</span>
                    <div class="atmosphere-btns">
                        <button class="btn-sm bg-meadow btn-active" onclick="changeScene('meadow', this)">Irish Meadow</button>
                        <button class="btn-sm bg-rainbow" onclick="changeScene('rainbow', this)">End O' the Rainbow</button>
                        <button class="btn-sm bg-disco" onclick="changeScene('disco', this)">Disco Time</button>
                        <button class="btn-sm bg-orange-900" onclick="changeScene('campfire', this)">Round the Campfire</button>
                    </div>
                </div>

                <div class="control-group horde-group">
                    <span class="label">Leprechauns</span>
                    <button class="stepper-btn" onclick="stepLep(-1)">−</button>
                    <input type="range" id="lep-slider" min="1" max="66" value="1" oninput="updateLepCount(this.value)">
                    <span id="count-display">1</span>
                    <button class="stepper-btn" onclick="stepLep(1)">+</button>
                </div>

                <div class="text-[9px] text-white/40 uppercase font-black leading-tight tracking-wider px-4 text-center">
                    Drag: Rotate • R-Click: Pan
                </div>
            </div>

            <div id="quick-actions">
                <button id="rand-btn" class="btn-sm btn-rand" onclick="randomParty()">🎰 Random</button>
                <button id="share-btn" class="btn-sm btn-share" onclick="shareParty()">🔗 Share</button>
                <button id="toggle-ui" onclick="toggleUI()">⚙️ Controls</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.170.0/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="js/App.js"></script>
    <script>
        function closeModal() {
            document.getElementById('share-modal').classList.add('hidden');
        }

        function copyAndClose() {
            const text = document.getElementById('share-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                closeModal();
                const toast = document.getElementById('toast');
                toast.innerText = "Copied to clipboard! ☘️";
                toast.classList.add('visible');
                setTimeout(() => { toast.classList.remove('visible'); }, 3000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                closeModal();
            });
        }

        function stepLep(val) {
            const slider = document.getElementById('lep-slider');
            const newVal = Math.max(1, Math.min(66, parseInt(slider.value) + val));
            slider.value = newVal;
            if (window.updateLepCount) window.updateLepCount(newVal);
        }
    </script>
</body>
</html>
